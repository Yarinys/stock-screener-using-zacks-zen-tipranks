name: Build TipRanks Cache

on:
  workflow_dispatch:
    inputs:
      script_file:
        description: "TipRanks cache builder script path in the repo"
        required: true
        default: "build_tipranks_cache_same_logic_2cols.py"
      ticker_file:
        description: "Ticker file path in the repo"
        required: true
        default: "tickers.txt"
      output_file:
        description: "Output cache CSV path"
        required: true
        default: "tipranks_cache.csv"
      log_file:
        description: "Output detailed log CSV path"
        required: true
        default: "tipranks_cache_log.csv"
      workers:
        description: "Parallel TipRanks workers"
        required: true
        default: "8"
      limit:
        description: "Optional: only process first N tickers. Leave empty for all."
        required: false
        default: ""
      request_delay:
        description: "Default minimum seconds between same-domain requests"
        required: true
        default: "0.75"
      tipranks_delay:
        description: "Minimum seconds between TipRanks requests"
        required: true
        default: "1.25"
      retries:
        description: "HTTP retries for transient/rate-limit failures"
        required: true
        default: "3"
      backoff:
        description: "Base exponential backoff seconds"
        required: true
        default: "2"
      progress_every:
        description: "Print progress every N completed tickers"
        required: true
        default: "50"
      no_skip_existing:
        description: "Re-check tickers already in the cache"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi beautifulsoup4 requests

      - name: Show repo files
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Files:"
          find . -maxdepth 3 -type f | sort

      - name: Validate input files
        run: |
          if [ ! -f "${{ github.event.inputs.script_file }}" ]; then
            echo "ERROR: script file not found: ${{ github.event.inputs.script_file }}"
            exit 1
          fi

          if [ ! -f "${{ github.event.inputs.ticker_file }}" ]; then
            echo "ERROR: ticker file not found: ${{ github.event.inputs.ticker_file }}"
            exit 1
          fi

      - name: Build TipRanks cache
        env:
          SCRIPT_FILE: ${{ github.event.inputs.script_file }}
          TICKER_FILE: ${{ github.event.inputs.ticker_file }}
          OUTPUT_FILE: ${{ github.event.inputs.output_file }}
          LOG_FILE: ${{ github.event.inputs.log_file }}
          WORKERS: ${{ github.event.inputs.workers }}
          LIMIT: ${{ github.event.inputs.limit }}
          REQUEST_DELAY: ${{ github.event.inputs.request_delay }}
          TIPRANKS_DELAY: ${{ github.event.inputs.tipranks_delay }}
          RETRIES: ${{ github.event.inputs.retries }}
          BACKOFF: ${{ github.event.inputs.backoff }}
          PROGRESS_EVERY: ${{ github.event.inputs.progress_every }}
          NO_SKIP_EXISTING: ${{ github.event.inputs.no_skip_existing }}
        run: |
          set -e

          cmd=(
            python "$SCRIPT_FILE"
            --file "$TICKER_FILE"
            --output "$OUTPUT_FILE"
            --log "$LOG_FILE"
            --workers "$WORKERS"
            --request-delay "$REQUEST_DELAY"
            --domain-delay "www.tipranks.com=$TIPRANKS_DELAY"
            --retries "$RETRIES"
            --backoff "$BACKOFF"
            --progress-every "$PROGRESS_EVERY"
          )

          if [ -n "$LIMIT" ]; then
            cmd+=(--limit "$LIMIT")
          fi

          if [ "$NO_SKIP_EXISTING" = "true" ]; then
            cmd+=(--no-skip-existing)
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Show output files
        if: always()
        run: |
          echo "CSV files:"
          find . -maxdepth 4 -type f -name "*.csv" -print -exec ls -lh {} \; | sort || true

      - name: Upload TipRanks cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tipranks-cache
          path: |
            ${{ github.event.inputs.output_file }}
            ${{ github.event.inputs.log_file }}
            *.csv
          if-no-files-found: warn
